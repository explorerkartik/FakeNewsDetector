<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FakeNews Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 1.8em; font-weight: 800; color: white; }
        .logo h1 span { color: #e94560; }
        .logo p { color: rgba(255,255,255,0.5); font-size: 0.9em; margin-top: 6px; }
        .msg { background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); color: #c084fc; padding: 12px 16px; border-radius: 12px; font-size: 0.9em; margin-bottom: 20px; text-align: center; }
        .msg.error { background: rgba(233,69,96,0.15); border-color: rgba(233,69,96,0.3); color: #f87171; }
        .google-btn { width: 100%; padding: 14px; background: white; color: #333; border: none; border-radius: 12px; font-size: 1em; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; transition: all 0.3s; margin-bottom: 20px; }
        .google-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,255,255,0.2); }
        .google-icon { width: 20px; height: 20px; }
        .divider { text-align: center; color: rgba(255,255,255,0.3); margin: 20px 0; font-size: 0.85em; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: rgba(255,255,255,0.1); }
        .divider::before { left: 0; } .divider::after { right: 0; }
        .form-group { margin-bottom: 16px; }
        label { display: block; color: rgba(255,255,255,0.6); font-size: 0.82em; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 13px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: rgba(255,255,255,0.07); color: white; font-size: 1em; transition: all 0.3s; }
        input:focus { outline: none; border-color: #a855f7; background: rgba(255,255,255,0.1); }
        input::placeholder { color: rgba(255,255,255,0.3); }
        .btn { width: 100%; padding: 14px; background: linear-gradient(90deg, #e94560, #a855f7); color: white; border: none; border-radius: 12px; font-size: 1em; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(233,69,96,0.4); }
        .footer-links { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.4); font-size: 0.88em; }
        .footer-links a { color: #a855f7; text-decoration: none; }
        .footer-links a:hover { text-decoration: underline; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: rgba(255,255,255,0.4); font-size: 0.85em; text-decoration: none; }
        .back-link a:hover { color: white; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>🔍 Fake<span>News</span>Detector</h1>
            <p>AI-Powered Fact Checker</p>
        </div>

        {% if msg %}
        <div class="msg {% if 'Invalid' in msg or 'Error' in msg %}error{% endif %}">{{ msg }}</div>
        {% endif %}

        <!-- GOOGLE LOGIN -->
        <a href="/auth/google" class="google-btn">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </a>

        <div class="divider">OR</div>

        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">🔍 Login</button>
        </form>

        <div class="footer-links">
            <p>Don't have an account? <a href="/register">Register here</a></p>
        </div>
        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>
</body>
</html>
