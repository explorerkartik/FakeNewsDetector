<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Check - FakeNews Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
{%- raw -%}
:root{--p1:#7c3aed;--p2:#2563eb;--p3:#a78bfa;--p4:#60a5fa;--bg:#06030f;--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.09);--text:#f1f5f9;--text-muted:rgba(241,245,249,0.45);--text-dim:rgba(241,245,249,0.22);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}button,a{cursor:pointer;}
body{font-family:'Bricolage Grotesque',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.28;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#7c3aed,transparent 70%);top:-100px;right:-80px;animation:float1 12s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#2563eb,transparent 70%);bottom:0;left:-100px;animation:float2 15s ease-in-out infinite;}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,30px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(167,139,250,0.025)1px,transparent 1px),linear-gradient(90deg,rgba(167,139,250,0.025)1px,transparent 1px);background-size:60px 60px;}
.card{position:relative;z-index:1;background:rgba(6,3,15,0.75);backdrop-filter:blur(28px);border:1px solid var(--glass-border);border-radius:28px;padding:44px 36px;width:100%;max-width:460px;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,0.5);}
.page-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.25);border-radius:100px;padding:4px 14px;font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--p3);margin-bottom:14px;}
.page-tag .dot{width:5px;height:5px;border-radius:50%;background:var(--p3);box-shadow:0 0 6px var(--p3);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
h1{font-size:1.5rem;font-weight:800;margin-bottom:4px;letter-spacing:-0.5px;}
h1 span{background:linear-gradient(135deg,var(--p3),var(--p4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-sub{color:var(--text-muted);font-size:0.8rem;margin-bottom:32px;}
/* ORB */
.orb-wrap{position:relative;width:150px;height:150px;margin:0 auto 22px;}
.orb-ring{position:absolute;inset:-8px;border-radius:50%;border:1px dashed rgba(167,139,250,0.2);animation:rotateSlow 20s linear infinite;}
.orb-ring2{position:absolute;inset:-18px;border-radius:50%;border:1px dashed rgba(124,58,237,0.1);animation:rotateSlow 30s linear infinite reverse;}
@keyframes rotateSlow{to{transform:rotate(360deg)}}
#orb{position:relative;z-index:1;width:150px;height:150px;border-radius:50%;background:rgba(13,13,74,0.6);border:3px solid rgba(124,58,237,0.5);display:flex;align-items:center;justify-content:center;font-size:3rem;cursor:pointer;transition:all 0.3s;box-shadow:0 0 30px rgba(124,58,237,0.25);}
#orb.listening{background:rgba(0,30,80,0.8);border-color:#00aaff;box-shadow:0 0 50px rgba(0,170,255,0.4);}
#orb.speaking{background:rgba(26,5,50,0.8);border-color:var(--p1);box-shadow:0 0 50px rgba(124,58,237,0.45);}
#status{font-size:0.88rem;color:var(--text-muted);margin-bottom:5px;}
#transcript{font-size:0.75rem;color:var(--text-muted);min-height:18px;margin-bottom:14px;font-family:'DM Mono',monospace;}
#response{background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:14px;padding:14px 16px;font-size:0.88rem;color:var(--text);line-height:1.7;min-height:60px;margin-bottom:22px;text-align:left;}
#holdBtn{padding:13px 36px;background:rgba(20,184,166,0.1);border:2px solid rgba(20,184,166,0.35);border-radius:100px;color:#2dd4bf;font-size:0.92rem;font-weight:700;cursor:pointer;transition:all 0.3s;font-family:inherit;}
#holdBtn:active{background:rgba(20,184,166,0.22);color:white;box-shadow:0 0 24px rgba(20,184,166,0.35);}
.back-link{margin-top:20px;display:block;}
.back-link a{color:var(--text-dim);font-size:0.78rem;text-decoration:none;font-family:'DM Mono',monospace;}
.back-link a:hover{color:var(--p3);}
{%- endraw -%}
</style>
</head>
<body>
<div class="bg-scene"><div class="orb orb1"></div><div class="orb orb2"></div><div class="grid-bg"></div></div>
<div class="card">
  <div class="page-tag"><span class="dot"></span> Hands-Free Detection</div>
  <h1><span>Voice</span> Check</h1>
  <p class="page-sub">Hold the button and speak the news — AI will analyze it</p>
  <div class="orb-wrap">
    <div class="orb-ring"></div><div class="orb-ring2"></div>
    <div id="orb">🎙️</div>
  </div>
  <div id="status">Hold the button and speak the news</div>
  <div id="transcript"></div>
  <div id="response">Your result will appear here...</div>
  <button id="holdBtn"
    ontouchstart="startListening()" ontouchend="stopListening()"
    onmousedown="startListening()" onmouseup="stopListening()">
    🎙️ Hold to speak
  </button>
  <div class="back-link"><a href="/detector">← Back to Detector</a></div>
</div>
<script>
/* ===== ORIGINAL VOICE JS — FULLY PRESERVED ===== */
let recognition; let finalText = "";
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('status').textContent = "Please use Chrome for voice input."; return null; }
  const r = new SR(); r.lang = 'en-IN'; r.continuous = false; r.interimResults = true;
  r.onstart = () => { document.getElementById('orb').className = 'listening'; document.getElementById('status').textContent = "Listening..."; finalText = ""; };
  r.onresult = (e) => { let interim = ""; for (let i = e.resultIndex; i < e.results.length; i++) { if (e.results[i].isFinal) finalText += e.results[i][0].transcript; else interim += e.results[i][0].transcript; } document.getElementById('transcript').textContent = finalText || interim; };
  r.onend = () => { document.getElementById('orb').className = ''; if (finalText.trim()) sendToAI(finalText.trim()); else document.getElementById('status').textContent = "Nothing was heard. Please try again."; };
  r.onerror = (e) => { document.getElementById('status').textContent = "Error: " + e.error; document.getElementById('orb').className = ''; };
  return r;
}
function startListening() { recognition = setupRecognition(); if (recognition) recognition.start(); }
function stopListening() { if (recognition) recognition.stop(); }
async function sendToAI(text) {
  document.getElementById('status').textContent = "Analyzing...";
  document.getElementById('response').textContent = "...";
  document.getElementById('transcript').textContent = "You said: " + text;
  try {
    const res = await fetch('/api/voice', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ message: text }) });
    const data = await res.json();
    const reply = data.reply;
    document.getElementById('response').textContent = reply;
    speak(reply);
  } catch (err) { document.getElementById('status').textContent = "Error — could not connect to the server."; }
}
function speak(text) {
  document.getElementById('orb').className = 'speaking';
  document.getElementById('status').textContent = "Speaking...";
  const utter = new SpeechSynthesisUtterance(text); utter.lang = 'en-IN'; utter.rate = 1.0;
  utter.onend = () => { document.getElementById('orb').className = ''; document.getElementById('status').textContent = "Hold the button and speak the news"; };
  speechSynthesis.speak(utter);
}
</script>
</body>
</html>
